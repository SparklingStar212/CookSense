<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookSense</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="/Icons/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">
</head>

<body>
  <nav>
    <div class="brand">
      <img src="/Icons/CookSense-brandname-and-logo.png" alt="CookSense Logo" class="logo">
      <img src="/Icons/CookSense-logo.png" alt="CookSense Icon" class="icon">
    </div>
    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#features">Features</a>
      <a href="#about">About Us</a>
      <a href="#contact">Contact</a>
    </div>
    <div class="search">
      <input type="text" placeholder="Search recipes...">
      <button type="submit"><img src="/Icons/search-icon.svg" alt=""></button>
    </div>
  </nav>
  <header>
    <h1 class="hero-title" id="myText"><img src="" alt=""></h1>
  </header>

  <main>
    <section>
      <h2>Welcome to CookSense</h2>
      <p>Know more about Nigerian cuisine and discover delicious recipes tailored to your taste.</p>
    </section>

    <section class="filter-section">
      <div>
        <p>Filter by:</p>
        <div class="filter-buttons">
          <button id="categories-btn">Categories</button>
          <button id="region-btn">Region</button>
          <button id="vegetarian-btn">Vegetarian</button>
          <button id="spicy-btn">Spicy</button>
        </div>
        <div class="filter-by-categories">
          <button id="mainCourse-btn">Main Course</button>
          <button id="soup-btn">Soup</button>
          <button id="swallow-btn">Swallow</button>
          <button id="snack-btn">Snack/Street Food</button>
          <button id="breakfast-btn">Breakfast/Snack</button>
          <button id="side-dish-btn">Side Dish</button>
          <button id="appetizer-btn">Appetizer/Side Dish</button>
          <button id="dessert-btn">Dessert/Snack</button>
        </div>
        <div class="filter-by-region">
          <button id="all-region-btn">All Regions</button>
          <button id="northern-nigeria-btn">Northern Nigeria</button>
          <button id="south-west-nigeria-btn">South-west Nigeria</button>
          <button id="south-east-nigeria-btn">South-east Nigeria</button>
          <button id="south-south-nigeria-btn">South-south Nigeria</button>
        </div>
      </div>
    </section>

    <section id="featured-recipes"></section>

    <div class="overlay" id="modalOverlay">
    </div>
  </main>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/TextPlugin.min.js"></script>
<script src="script.js"></script>
</html>
